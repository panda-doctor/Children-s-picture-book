<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事编辑器 - 儿童故事绘本生成器</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-icon">📚</span>
            <span>儿童故事绘本生成器</span>
        </div>
        <div class="nav-links">
            <a href="/">创作绘本</a>
            <a href="/editor" class="active">故事编辑器</a>
            <a href="javascript:void(0)" onclick="editorApp.goToLibrary()">我的绘本馆</a>
        </div>
    </nav>

    <main class="main-container single-column">
        <section class="card wide-card">
            <h1 class="page-title">🎨 故事编辑器 & 绘本馆</h1>
            <p class="page-subtitle">管理你的故事和已生成的绘本</p>

            <div class="editor-tabs">
                <button class="tab-btn active" data-tab="library">📚 我的绘本馆</button>
                <button class="tab-btn" data-tab="upload">📤 上传故事文件</button>
            </div>

            <!-- 绘本馆 -->
            <div id="libraryTab" class="tab-content active">
                <div id="booksList" class="books-list">
                    <div class="empty-state">
                        <span class="empty-icon">📖</span>
                        <p>还没有绘本，快去创作一本吧！</p>
                    </div>
                </div>
            </div>

            <!-- 上传文件 -->
            <div id="uploadTab" class="tab-content">
                <!-- 家长模式锁定层 -->
                <div id="parentLock" class="parent-lock">
                    <span class="lock-icon">🔒</span>
                    <p>上传自定义故事文件需要家长验证</p>
                    <button type="button" class="btn btn-primary" onclick="editorApp.promptParent()">
                        🔑 家长验证
                    </button>
                </div>

                <!-- 解锁后显示的上传区 -->
                <div id="uploadInner" style="display: none;">
                    <div class="upload-area" id="uploadArea">
                        <span class="upload-icon">📁</span>
                        <p class="upload-text">拖拽 TXT 或 JSON 文件到这里</p>
                        <p class="upload-hint">或点击选择文件</p>
                        <input type="file" id="fileInput" accept=".txt,.json" style="display: none;">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="editorApp.uploadStory()">
                            📤 上传并预览
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="editorApp.parentLogout()">
                            🔓 退出家长模式
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 家长验证弹窗 -->
    <div id="parentModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn" onclick="editorApp.closeParentModal()">&times;</span>
            <div class="result-icon">🔒</div>
            <h2>家长验证</h2>
            <p>请输入家长密码以解锁编辑功能</p>
            <input type="password" id="parentPassword" class="parent-input" placeholder="家长密码">
            <div class="result-actions">
                <button type="button" class="btn btn-primary" onclick="editorApp.verifyParent()">
                    确认
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/editor.js"></script>
</body>
</html>
